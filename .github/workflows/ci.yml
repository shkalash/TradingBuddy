name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes

      - name: Cache Swift Packages
        uses: actions/cache@v4
        with:
          path: .swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('TradingBuddy/TradingBuddy.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TradingBuddy/TradingBuddy.xcodeproj \
            -scheme TradingBuddy \
            -clonedSourcePackagesDirPath .swiftpm

      - name: Build
        run: |
          xcodebuild build \
            -project TradingBuddy/TradingBuddy.xcodeproj \
            -scheme TradingBuddy \
            -configuration Debug \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath .swiftpm \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project TradingBuddy/TradingBuddy.xcodeproj \
            -scheme TradingBuddy \
            -testPlan TradingBuddyTests \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath .swiftpm \
            -resultBundlePath TestResults/unit.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project TradingBuddy/TradingBuddy.xcodeproj \
            -scheme TradingBuddy \
            -testPlan TradingBuddyUITests \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath .swiftpm \
            -resultBundlePath TestResults/ui.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ github.run_number }}
          path: TestResults/
          retention-days: 14
