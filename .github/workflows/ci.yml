name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TradingBuddy/TradingBuddy.xcodeproj \
            -scheme TradingBuddy

      - name: Build
        run: |
          xcodebuild build \
            -project TradingBuddy/TradingBuddy.xcodeproj \
            -scheme TradingBuddy \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project TradingBuddy/TradingBuddy.xcodeproj \
            -scheme TradingBuddy \
            -testPlan TradingBuddyTests \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults/unit.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project TradingBuddy/TradingBuddy.xcodeproj \
            -scheme TradingBuddy \
            -testPlan TradingBuddyUITests \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults/ui.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: TestResults/
          retention-days: 14
